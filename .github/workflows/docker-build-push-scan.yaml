name: Docker Build, Push and Scan

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full Docker image name (e.g. dockerusername/imagename)"
        required: true
        type: string
      dockerhub_username:
        description: "DockerHub username (public, not secret)"
        required: true
        type: string
      dockerfile_path:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      docker_context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      registry:
        description: "Container registry URL"
        required: false
        type: string
        default: "docker.io"
      build_tag_prefix:
        description: "Prefix for build tag version"
        required: false
        type: string
        default: "v1"
      push_latest:
        description: "Whether to push latest tag"
        required: false
        type: boolean
        default: true
      create_git_tag:
        description: "Whether to create a git tag"
        required: false
        type: boolean
        default: true
      scout_severities:
        description: "Docker Scout severity levels to scan"
        required: false
        type: string
        default: "critical,high,medium"
      enable_cache:
        description: "Enable GitHub Actions cache for Docker builds"
        required: false
        type: boolean
        default: true
    secrets:
      dockerhub_token:
        description: "DockerHub access token"
        required: true
    outputs:
      build_tag:
        description: "The generated build tag"
        value: ${{ jobs.build-scan-and-push.outputs.build_tag }}
      full_image_name:
        description: "Full image name with registry"
        value: ${{ jobs.build-scan-and-push.outputs.full_image_name }}

env:
  REGISTRY: ${{ inputs.registry }}
  IMAGE_NAME: ${{ inputs.image_name }}
  NOTES: ${{ github.workspace }}/release-notes.md

jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    outputs:
      build_tag: ${{ steps.build_number.outputs.BUILD_TAG }}
      full_image_name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get default branch
        id: repo_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEFAULT_BRANCH=$(gh api repos/${{ github.repository }} --jq .default_branch)
          echo "DEFAULT_BRANCH=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT

      - name: Generate build number
        id: build_number
        run: |
          if [[ "${{ github.ref_name }}" == "${{ steps.repo_info.outputs.DEFAULT_BRANCH }}" ]]; then
            BUILD_TAG="${{ inputs.build_tag_prefix }}.${{ github.run_number }}"
          else
            BUILD_TAG="feature-${{ inputs.build_tag_prefix }}.${{ github.run_number }}"
          fi
          echo "BUILD_TAG=$BUILD_TAG" >> $GITHUB_OUTPUT

          {
            echo "### 🏗️ Build Information"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Build Tag** | \`$BUILD_TAG\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Run Number** | ${{ github.run_number }} |"
            echo "| **Commit SHA** | \`${{ github.sha }}\` |"
            echo "| **Image Name** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY" >> "$NOTES"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile_path }}
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build_number.outputs.BUILD_TAG }}
            ${{ inputs.push_latest && github.ref_name == steps.repo_info.outputs.DEFAULT_BRANCH && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-from: ${{ inputs.enable_cache && 'type=gha' || '' }}
          cache-to: ${{ inputs.enable_cache && 'type=gha,mode=max' || '' }}

      - name: Display build summary
        run: |
          {
            echo "## 📦 Docker Image Built Successfully"
            echo ""
            echo "**Image Tags:**"
            echo "\`\`\`"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build_number.outputs.BUILD_TAG }}"
            if [[ "${{ inputs.push_latest }}" == "true" && "${{ github.ref_name }}" == "${{ steps.repo_info.outputs.DEFAULT_BRANCH }}" ]]; then
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi
            echo "\`\`\`"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY" >> "$NOTES"

      - name: Scan image with Docker Scout
        id: scout_scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build_number.outputs.BUILD_TAG }}
          only-severities: ${{ inputs.scout_severities }}
          write-comment: false
          summary: true

      - name: Docker Scout quickview
        id: scout_quickview
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build_number.outputs.BUILD_TAG }}
          write-comment: false
          summary: true

      - name: Append Scout link to release notes
        run: |
          {
            echo "## 🔍 Security Scan"
            echo ""
            echo "Docker Scout CVE scan completed. Full results are available in the [Actions run summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            echo ""
          } >> "$NOTES"

      - name: Push to Docker Hub
        id: push
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build_number.outputs.BUILD_TAG }}
          if [[ "${{ inputs.push_latest }}" == "true" && "${{ github.ref_name }}" == "${{ steps.repo_info.outputs.DEFAULT_BRANCH }}" ]]; then
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          fi

          {
            echo "## 🚀 Pushed to Docker Hub"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Registry** | \`${{ env.REGISTRY }}\` |"
            echo "| **Repository** | \`${{ env.IMAGE_NAME }}\` |"
            echo ""
            echo "**Pushed Tags:**"
            echo "\`\`\`"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build_number.outputs.BUILD_TAG }}"
            if [[ "${{ inputs.push_latest }}" == "true" && "${{ github.ref_name }}" == "${{ steps.repo_info.outputs.DEFAULT_BRANCH }}" ]]; then
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi
            echo "\`\`\`"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY" >> "$NOTES"

      - name: Final Summary
        run: |
          {
            echo "---"
            echo "## ✨ Workflow Completed Successfully"
            echo ""
            echo "### Summary"
            echo "- ✅ Docker image built with tag \`${{ steps.build_number.outputs.BUILD_TAG }}\`"
            echo "- ✅ Image pushed to Docker Hub"
            echo "- ✅ Security scan completed with Docker Scout"
            echo ""
            echo "### 🐳 Pull Command"
            echo "\`\`\`bash"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.build_number.outputs.BUILD_TAG }}"
            echo "\`\`\`"
          } | tee -a "$GITHUB_STEP_SUMMARY" >> "$NOTES"

      - name: Append Auto-Generated Changelog
        if: ${{ inputs.create_git_tag && github.ref_name == steps.repo_info.outputs.DEFAULT_BRANCH }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_TAG="${{ steps.build_number.outputs.BUILD_TAG }}"
          GENERATED=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            --method POST \
            -f tag_name="$BUILD_TAG" \
            --jq '.body' 2>/dev/null || echo "")

          if [[ -n "$GENERATED" ]]; then
            {
              echo ""
              echo "---"
              echo "$GENERATED"
            } | tee -a "$GITHUB_STEP_SUMMARY" >> "$NOTES"
          fi

      - name: Create Release
        if: ${{ inputs.create_git_tag && github.ref_name == steps.repo_info.outputs.DEFAULT_BRANCH }}
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_TAG="${{ steps.build_number.outputs.BUILD_TAG }}"

          RELEASE_URL=$(gh release create "$BUILD_TAG" \
            --title "Release $BUILD_TAG" \
            --notes-file "$NOTES")

          echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_OUTPUT

          {
            echo ""
            echo "---"
            echo "## 🏷️ Release Created"
            echo "**Release URL:** $RELEASE_URL"
          } | tee -a "$GITHUB_STEP_SUMMARY" >> "$NOTES"